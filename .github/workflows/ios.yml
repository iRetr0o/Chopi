name: iOS CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:

    runs-on: macos-latest

    env:
      SCHEME: Chopi
      PROJECT: Chopi.xcodeproj
      DEVICE: "iPhone 16"
      PLATFORM: "iOS Simulator"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
          -scheme $SCHEME \
          -project $PROJECT \
          -destination "platform=$PLATFORM,name=$DEVICE"

      - name: Run Unit Tests
        run: |
          xcodebuild test-without-building \
          -scheme $SCHEME \
          -project $PROJECT \
          -testPlan Chopi \
          -destination "platform=$PLATFORM,name=$DEVICE"

      - name: Run UI Tests
        # UI tests in:
        # - All PRs (to main or develop)
        # - Push to release/ (exhaustive testing before production)
        # - Push to hotfix/ (validate critical fix)
        if: |
          github.event_name == 'pull_request' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/heads/hotfix/')
        run: |
          xcodebuild test-without-building \
          -scheme $SCHEME \
          -project $PROJECT \
          -testPlan ChopiUI \
          -destination "platform=$PLATFORM,name=$DEVICE"
